<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>FigmaLite Mobile Debug</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="m-0 p-0 bg-[#0a0a0a]">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
const { useReducer, useRef, useEffect, useMemo, useCallback, useState } = React;

const Icon = ({ name, size = 16, className = "", style = {}, ...rest }) => (
  <span
    className={`material-symbols-outlined ${className}`.trim()}
    style={{
      fontSize: size,
      lineHeight: 1,
      display: "inline-flex",
      alignItems: "center",
      justifyContent: "center",
      verticalAlign: "middle",
      userSelect: "none",
      ...style
    }}
    {...rest}
  >
    {name}
  </span>
);

const Hand = (props) => <Icon name="pan_tool_alt" {...props} />;
const MousePointer2 = (props) => <Icon name="arrow_selector_tool" {...props} />;
const Square = (props) => <Icon name="crop_square" {...props} />;
const Circle = (props) => <Icon name="circle" {...props} />;
const Triangle = (props) => <Icon name="change_history" {...props} />;
const Minus = (props) => <Icon name="remove" {...props} />;
const Trash2 = (props) => <Icon name="delete" {...props} />;
const FileImage = (props) => <Icon name="imagesmode" {...props} />;
const Settings2 = (props) => <Icon name="tune" {...props} />;
const X = (props) => <Icon name="close" {...props} />;
const Lock = (props) => <Icon name="lock" {...props} />;
const Unlock = (props) => <Icon name="lock_open" {...props} />;
const RotateCw = (props) => <Icon name="refresh" {...props} />;
const Droplets = (props) => <Icon name="water_drop" {...props} />;
const Type = (props) => <Icon name="opacity" {...props} />;
const Layers = (props) => <Icon name="layers" {...props} />;
const Eye = (props) => <Icon name="visibility" {...props} />;
const EyeOff = (props) => <Icon name="visibility_off" {...props} />;
const PenTool = (props) => <Icon name="draw" {...props} />;
const Pentagon = (props) => <Icon name="pentagon" {...props} />;
const Check = (props) => <Icon name="check" {...props} />;
const Hash = (props) => <Icon name="tag" {...props} />;
const Sun = (props) => <Icon name="light_mode" {...props} />;
const Palette = (props) => <Icon name="palette" {...props} />;

const generateId = () => Math.random().toString(36).substring(2, 9);

const SHAPE_TYPES = { 
  RECT: 'rect', 
  CIRCLE: 'circle', 
  TRIANGLE: 'triangle', 
  LINE: 'line',
  POLY: 'poly',
  IMAGE: 'image'
};
const TOOLS = { PAN: 'pan', SELECT: 'select', POLY_DRAW: 'poly_draw' };
const COLOR_PRESETS = [
  '#2563eb', '#7c3aed', '#db2777', '#ea580c',
  '#ca8a04', '#16a34a', '#0d9488', '#0891b2',
  '#475569', '#f8fafc'
];

const renderLineWithDivisions = (shape, shapeStyle) => {
  const x1 = shape.x - shapeStyle.left;
  const y1 = shape.y - shapeStyle.top;
  const x2 = shape.x2 - shapeStyle.left;
  const y2 = shape.y2 - shapeStyle.top;
  const divisions = shape.divisions || 1;
  const dx = x2 - x1;
  const dy = y2 - y1;
  const angle = Math.atan2(dy, dx);
  const markLength = 10;
  const longMarkLength = 20;

  const getMarkCoords = (x, y, len) => {
    const perpA = angle + Math.PI / 2;
    return {
      x1: x + Math.cos(perpA) * (len / 2),
      y1: y + Math.sin(perpA) * (len / 2),
      x2: x - Math.cos(perpA) * (len / 2),
      y2: y - Math.sin(perpA) * (len / 2)
    };
  };

  const mainMarks = [
    getMarkCoords(x1, y1, longMarkLength),
    getMarkCoords(x1 + dx * 0.5, y1 + dy * 0.5, longMarkLength),
    getMarkCoords(x2, y2, longMarkLength)
  ];

  const divisionLines = [];
  if (divisions > 1) {
    const stepSize = 1 / (divisions + 1);
    for (let j = 1; j <= divisions; j++) {
      const t = j * stepSize;
      if (Math.abs(t - 0.5) < 0.01) continue;
      const mx = x1 + dx * t;
      const my = y1 + dy * t;
      divisionLines.push(getMarkCoords(mx, my, markLength));
    }
  }

  return (
    <>
      <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={shape.stroke} strokeWidth={shape.strokeWidth} strokeLinecap="round" />
      {mainMarks.map((m, idx) => (
        <line key={`main-${idx}`} x1={m.x1} y1={m.y1} x2={m.x2} y2={m.y2} stroke={shape.stroke} strokeWidth={shape.strokeWidth} />
      ))}
      {divisionLines.map((l, idx) => (
        <line key={`div-${idx}`} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={shape.stroke} strokeWidth={shape.strokeWidth} />
      ))}
    </>
  );
};

const ShapeItem = React.memo(function ShapeItem({ shape, isSelected, onShapeInteraction, onToggleLock, stageScale = 1, activeHandle = null, onImageLongPress = null }) {
  const isLine = shape.type === 'line';
  const isPoly = shape.type === 'poly';
  const isImage = shape.type === 'image';
  const canRotate = shape.type !== 'line' && shape.type !== 'poly';
  const safeScale = Math.max(stageScale, 0.01);
  const inverseScale = 1 / safeScale;
  const showCrosshairHandles = safeScale > 2;
  const isHandleActive = useCallback((mode, extra = null) => (
    isSelected
    && activeHandle
    && activeHandle.id === shape.id
    && activeHandle.mode === mode
    && activeHandle.extra === extra
  ), [isSelected, activeHandle, shape.id]);

  const renderHandleGlyph = useCallback((isActive) => {
    if (showCrosshairHandles) {
      return (
        <div className="relative w-4 h-4">
          <div className={`absolute left-1/2 top-0 bottom-0 w-px -translate-x-1/2 ${isActive ? 'bg-yellow-300' : 'bg-white'} shadow-[0_0_0_1px_rgba(59,130,246,0.9)]`} />
          <div className={`absolute top-1/2 left-0 right-0 h-px -translate-y-1/2 ${isActive ? 'bg-yellow-300' : 'bg-white'} shadow-[0_0_0_1px_rgba(59,130,246,0.9)]`} />
        </div>
      );
    }
    return (
      <div className={`w-4 h-4 border-2 rounded-full shadow-lg ${isActive ? 'bg-yellow-300 border-yellow-500 ring-2 ring-yellow-400/70' : 'bg-white border-blue-500'}`} />
    );
  }, [showCrosshairHandles]);

  const longPressTimerRef = useRef(null);
  const touchStartRef = useRef(null);

  const clearLongPress = useCallback(() => {
    if (longPressTimerRef.current) {
      clearTimeout(longPressTimerRef.current);
      longPressTimerRef.current = null;
    }
    touchStartRef.current = null;
  }, []);

  const startImageLongPress = useCallback((clientX, clientY) => {
    if (!isImage || !onImageLongPress) return;
    clearLongPress();
    touchStartRef.current = { x: clientX, y: clientY };
    longPressTimerRef.current = setTimeout(() => {
      onImageLongPress(shape.id, { x: clientX, y: clientY });
      clearLongPress();
    }, 2000);
  }, [isImage, onImageLongPress, shape.id, clearLongPress]);

  const moveImageLongPress = useCallback((clientX, clientY) => {
    if (!touchStartRef.current) return;
    const dist = Math.hypot(clientX - touchStartRef.current.x, clientY - touchStartRef.current.y);
    if (dist > 10) clearLongPress();
  }, [clearLongPress]);

  useEffect(() => () => clearLongPress(), [clearLongPress]);

  const shapeStyle = useMemo(() => (
    isLine
      ? {
          left: Math.min(shape.x, shape.x2),
          top: Math.min(shape.y, shape.y2),
          width: Math.max(Math.abs(shape.x2 - shape.x), 1),
          height: Math.max(Math.abs(shape.y2 - shape.y), 1)
        }
      : {
          left: shape.x,
          top: shape.y,
          width: shape.w,
          height: shape.h
        }
  ), [isLine, shape.x, shape.y, shape.x2, shape.y2, shape.w, shape.h]);

  const imageFilter = useMemo(
    () => `hue-rotate(${shape.hue || 0}deg) saturate(${shape.saturation ?? 100}%) brightness(${shape.brightness ?? 100}%) invert(${shape.invert ? 100 : 0}%)`,
    [shape.hue, shape.saturation, shape.brightness, shape.invert]
  );

  return (
    <div
      className={`absolute ${isImage ? 'z-0' : (isSelected ? 'z-20' : 'z-10')} touch-none`}
      onMouseDown={(e) => onShapeInteraction(e, shape.id, shape.isLocked ? 'select-only' : 'move')}
      onTouchStart={(e) => onShapeInteraction(e, shape.id, shape.isLocked ? 'select-only' : 'move')}
      style={{
        ...shapeStyle,
        opacity: shape.opacity / 100,
        transform: isLine ? 'none' : `rotate(${shape.rotation}deg)`,
        transformOrigin: 'center center',
        outline: isSelected ? `2px solid ${shape.isLocked ? '#fb923c' : '#3b82f6'}` : 'none',
        outlineOffset: '2px',
        pointerEvents: 'auto',
        cursor: shape.isLocked ? 'default' : 'move'
      }}
    >
      {isImage ? (
        <img
          src={shape.src}
          onContextMenu={(e) => e.preventDefault()}
          onDragStart={(e) => e.preventDefault()}
          onTouchStart={(e) => {
            if (!e.touches || !e.touches[0]) return;
            startImageLongPress(e.touches[0].clientX, e.touches[0].clientY);
          }}
          onTouchMove={(e) => {
            if (!e.touches || !e.touches[0]) return;
            moveImageLongPress(e.touches[0].clientX, e.touches[0].clientY);
          }}
          onTouchEnd={clearLongPress}
          onTouchCancel={clearLongPress}
          onMouseDown={(e) => startImageLongPress(e.clientX, e.clientY)}
          onMouseMove={(e) => moveImageLongPress(e.clientX, e.clientY)}
          onMouseUp={clearLongPress}
          onMouseLeave={clearLongPress}
          style={{
            width: '100%',
            height: '100%',
            objectFit: 'fill',
            display: 'block',
            filter: imageFilter,
            WebkitTouchCallout: 'none',
            WebkitUserSelect: 'none',
            userSelect: 'none'
          }}
          draggable={false}
          alt="Layer"
        />
      ) : (
        <svg width="100%" height="100%" viewBox={`0 0 ${shapeStyle.width} ${shapeStyle.height}`} preserveAspectRatio="none" className="overflow-visible block">
          {shape.type === 'rect' && <rect width="100%" height="100%" fill={shape.fill} stroke={shape.stroke} strokeWidth={shape.strokeWidth} />}
          {shape.type === 'circle' && <ellipse cx="50%" cy="50%" rx="50%" ry="50%" fill={shape.fill} stroke={shape.stroke} strokeWidth={shape.strokeWidth} />}
          {shape.type === 'triangle' && <polygon points={`${shape.w/2},0 ${shape.w},${shape.h} 0,${shape.h}`} fill={shape.fill} stroke={shape.stroke} strokeWidth={shape.strokeWidth} />}
          {isLine && renderLineWithDivisions(shape, shapeStyle)}
          {isPoly && (
            <polygon
              points={shape.points.map(p => `${p.x},${p.y}`).join(' ')}
              fill={shape.isClosed ? shape.fill : 'transparent'}
              stroke={shape.stroke}
              strokeWidth={shape.strokeWidth}
            />
          )}
        </svg>
      )}

      {isSelected && !shape.isLocked && (
        <>
          <button
            className="absolute -top-10 -right-2 p-2 rounded-full shadow-lg border-2 border-[#0a0a0a] transition-all active:scale-95 bg-[#222] text-gray-400 hover:text-white pointer-events-auto"
            style={{ transform: `scale(${inverseScale})`, transformOrigin: 'top right' }}
            onClick={(e) => { e.stopPropagation(); onToggleLock(shape.id); }}
          >
            <Unlock size={14} />
          </button>
          {canRotate && (
            <div className="absolute -top-10 left-1/2 -translate-x-1/2 flex flex-col items-center pointer-events-auto" onMouseDown={(e) => onShapeInteraction(e, shape.id, 'rotate')} onTouchStart={(e) => onShapeInteraction(e, shape.id, 'rotate')}>
              <div className="w-0.5 h-4 bg-blue-500" />
              <div className="w-6 h-6 bg-white border-2 border-blue-500 rounded-full flex items-center justify-center text-blue-500 shadow-lg cursor-alias"><RotateCw size={10} /></div>
            </div>
          )}

          {isPoly && shape.points.map((p, idx) => (
            <div
              key={idx}
              className="absolute w-8 h-8 flex items-center justify-center cursor-crosshair z-30 pointer-events-auto"
              style={{ left: p.x, top: p.y, transform: `translate(-50%, -50%) scale(${inverseScale})` }}
              onMouseDown={(e) => onShapeInteraction(e, shape.id, 'poly-point', idx)}
              onTouchStart={(e) => onShapeInteraction(e, shape.id, 'poly-point', idx)}
            >
              {renderHandleGlyph(isHandleActive('poly-point', idx))}
            </div>
          ))}

          {isLine && (
            <>
              <div
                className="absolute w-8 h-8 flex items-center justify-center pointer-events-auto"
                style={{
                  left: shape.x <= shape.x2 ? 0 : shapeStyle.width,
                  top: shape.y <= shape.y2 ? 0 : shapeStyle.height,
                  transform: `translate(-50%, -50%) scale(${inverseScale})`
                }}
                onMouseDown={(e) => onShapeInteraction(e, shape.id, 'line-point', 'start')}
                onTouchStart={(e) => onShapeInteraction(e, shape.id, 'line-point', 'start')}
              >
                {renderHandleGlyph(isHandleActive('line-point', 'start'))}
              </div>
              <div
                className="absolute w-8 h-8 flex items-center justify-center pointer-events-auto"
                style={{
                  left: shape.x > shape.x2 ? 0 : shapeStyle.width,
                  top: shape.y > shape.y2 ? 0 : shapeStyle.height,
                  transform: `translate(-50%, -50%) scale(${inverseScale})`
                }}
                onMouseDown={(e) => onShapeInteraction(e, shape.id, 'line-point', 'end')}
                onTouchStart={(e) => onShapeInteraction(e, shape.id, 'line-point', 'end')}
              >
                {renderHandleGlyph(isHandleActive('line-point', 'end'))}
              </div>
            </>
          )}

          {!isLine && !isPoly && (
            <div
              className="absolute w-8 h-8 flex items-center justify-center cursor-se-resize pointer-events-auto"
              style={{
                left: shapeStyle.width,
                top: shapeStyle.height,
                transform: `translate(-50%, -50%) scale(${inverseScale})`
              }}
              onMouseDown={(e) => onShapeInteraction(e, shape.id, 'resize')}
              onTouchStart={(e) => onShapeInteraction(e, shape.id, 'resize')}
            >
              {renderHandleGlyph(isHandleActive('resize'))}
            </div>
          )}
        </>
      )}

      {isSelected && shape.isLocked && (
        <button
          className="absolute -top-10 -right-2 p-2 rounded-full shadow-lg border-2 border-[#0a0a0a] transition-all active:scale-95 bg-orange-500 text-white pointer-events-auto"
          style={{ transform: `scale(${inverseScale})`, transformOrigin: 'top right' }}
          onClick={(e) => { e.stopPropagation(); onToggleLock(shape.id); }}
        >
          <Lock size={14} />
        </button>
      )}
    </div>
  );
});

function useStageGestures({ activeToolRef, touchState, stageRef, setStage, containerRef }) {
  const rafIdRef = useRef(0);
  const nextStageRef = useRef(null);

  const flushStageUpdate = useCallback(() => {
    rafIdRef.current = 0;
    const payload = nextStageRef.current;
    if (!payload) return;
    nextStageRef.current = null;

    if (payload.type === 'pan') {
      setStage(s => ({ ...s, x: payload.x, y: payload.y }));
      return;
    }

    if (payload.type === 'pinch') {
      setStage({ scale: payload.scale, x: payload.x, y: payload.y });
    }
  }, [setStage]);

  const scheduleStageUpdate = useCallback((payload) => {
    nextStageRef.current = payload;
    if (rafIdRef.current) return;
    rafIdRef.current = requestAnimationFrame(flushStageUpdate);
  }, [flushStageUpdate]);

  const cancelScheduledStageUpdate = useCallback(() => {
    if (rafIdRef.current) {
      cancelAnimationFrame(rafIdRef.current);
      rafIdRef.current = 0;
    }
    nextStageRef.current = null;
  }, []);

  useEffect(() => () => cancelScheduledStageUpdate(), [cancelScheduledStageUpdate]);

  const handleCanvasTouchStart = useCallback((e) => {
    if (activeToolRef.current === TOOLS.POLY_DRAW) return;
    const currentStage = stageRef.current;

    if (e.touches.length === 1 && activeToolRef.current === TOOLS.PAN) {
      e.preventDefault();
      cancelScheduledStageUpdate();
      const touch = e.touches[0];
      touchState.current = {
        initialDist: 0,
        initialScale: currentStage.scale,
        initialX: touch.clientX,
        initialY: touch.clientY,
        initialStageX: currentStage.x,
        initialStageY: currentStage.y
      };
    } else if (e.touches.length === 2) {
      e.preventDefault();
      cancelScheduledStageUpdate();
      const t1 = e.touches[0];
      const t2 = e.touches[1];
      const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
      const midX = (t1.clientX + t2.clientX) / 2;
      const midY = (t1.clientY + t2.clientY) / 2;
      touchState.current = {
        initialDist: dist,
        initialScale: currentStage.scale,
        initialX: midX,
        initialY: midY,
        initialStageX: currentStage.x,
        initialStageY: currentStage.y
      };
    }
  }, [activeToolRef, touchState, stageRef, cancelScheduledStageUpdate]);

  const handleCanvasTouchMove = useCallback((e) => {
    if (activeToolRef.current === TOOLS.POLY_DRAW) return;

    if (e.touches.length === 1 && activeToolRef.current === TOOLS.PAN) {
      e.preventDefault();
      const touch = e.touches[0];
      const dx = touch.clientX - touchState.current.initialX;
      const dy = touch.clientY - touchState.current.initialY;
      scheduleStageUpdate({
        type: 'pan',
        x: touchState.current.initialStageX + dx,
        y: touchState.current.initialStageY + dy
      });
    } else if (e.touches.length === 2) {
      e.preventDefault();
      const currentStage = stageRef.current;
      if (!touchState.current.initialDist || !touchState.current.initialScale) {
        const t1 = e.touches[0];
        const t2 = e.touches[1];
        const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        const midX = (t1.clientX + t2.clientX) / 2;
        const midY = (t1.clientY + t2.clientY) / 2;
        touchState.current = {
          initialDist: dist,
          initialScale: currentStage.scale,
          initialX: midX,
          initialY: midY,
          initialStageX: currentStage.x,
          initialStageY: currentStage.y
        };
        return;
      }
      const t1 = e.touches[0];
      const t2 = e.touches[1];
      const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
      const midX = (t1.clientX + t2.clientX) / 2;
      const midY = (t1.clientY + t2.clientY) / 2;
      const scaleChange = dist / touchState.current.initialDist;
      const newScale = Math.min(Math.max(0.1, touchState.current.initialScale * scaleChange), 5);
      const rect = containerRef.current.getBoundingClientRect();
      const originX = midX - rect.left;
      const originY = midY - rect.top;
      const dx = (originX - touchState.current.initialStageX) * (newScale / touchState.current.initialScale);
      const dy = (originY - touchState.current.initialStageY) * (newScale / touchState.current.initialScale);
      if (!Number.isFinite(newScale) || !Number.isFinite(dx) || !Number.isFinite(dy)) return;
      scheduleStageUpdate({
        type: 'pinch',
        scale: newScale,
        x: originX - dx,
        y: originY - dy
      });
    }
  }, [activeToolRef, touchState, containerRef, scheduleStageUpdate, stageRef]);

  const handleCanvasTouchEnd = useCallback((e) => {
    if (nextStageRef.current) {
      if (rafIdRef.current) {
        cancelAnimationFrame(rafIdRef.current);
        rafIdRef.current = 0;
      }
      flushStageUpdate();
    }

    const currentStage = stageRef.current;
    if (e && e.touches && e.touches.length === 1 && activeToolRef.current === TOOLS.PAN) {
      // После завершения pinch пересобираем baseline, чтобы не было рывка при продолжении pan одним пальцем.
      const touch = e.touches[0];
      touchState.current = {
        initialX: touch.clientX,
        initialY: touch.clientY,
        initialStageX: currentStage.x,
        initialStageY: currentStage.y
      };
      return;
    }

    if (!e || !e.touches || e.touches.length === 0) {
      touchState.current = {
        initialDist: 0,
        initialScale: currentStage.scale,
        initialX: 0,
        initialY: 0,
        initialStageX: currentStage.x,
        initialStageY: currentStage.y
      };
    }
  }, [flushStageUpdate, activeToolRef, stageRef, touchState]);

  const handleCanvasTouchCancel = useCallback(() => {
    handleCanvasTouchEnd();
  }, [handleCanvasTouchEnd]);

  return { handleCanvasTouchStart, handleCanvasTouchMove, handleCanvasTouchEnd, handleCanvasTouchCancel };
}

function useShapeTransform({
  activeToolRef,
  shapesRef,
  stageRef,
  keepAspectRatioRef,
  setShapes,
  setSelectedId,
  setIsInteracting,
  setActiveHandle
}) {
  const listenersRef = useRef({ onMove: null, onUp: null });
  const rafIdRef = useRef(0);
  const lastPointerRef = useRef(null);

  const cleanupListeners = useCallback(() => {
    const { onMove, onUp } = listenersRef.current;
    if (!onMove || !onUp) return;
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
    window.removeEventListener('touchmove', onMove);
    window.removeEventListener('touchend', onUp);
    window.removeEventListener('touchcancel', onUp);
    window.removeEventListener('blur', onUp);
    listenersRef.current = { onMove: null, onUp: null };

    if (rafIdRef.current) {
      cancelAnimationFrame(rafIdRef.current);
      rafIdRef.current = 0;
    }
    lastPointerRef.current = null;
  }, []);

  useEffect(() => () => cleanupListeners(), [cleanupListeners]);

  const updateShapeById = useCallback((prevShapes, shapeId, updater) => {
    const idx = prevShapes.findIndex(s => s.id === shapeId);
    if (idx === -1) return prevShapes;
    const current = prevShapes[idx];
    const nextShape = updater(current);
    if (nextShape === current) return prevShapes;
    const nextShapes = prevShapes.slice();
    nextShapes[idx] = nextShape;
    return nextShapes;
  }, []);

  const handleShapeInteraction = useCallback((e, id, mode, extra = null) => {
    if (activeToolRef.current === TOOLS.POLY_DRAW) return;
    if (activeToolRef.current === TOOLS.PAN) return;
    const shape = shapesRef.current.find(s => s.id === id);
    if (!shape || !shape.isVisible) return;
    if (shape.isLocked && mode !== 'select-only') return;

    const isTouch = e.type.startsWith('touch');
    if (isTouch && e.touches.length > 1) {
      // Не запускаем трансформацию фигуры для multi-touch:
      // жест должен обработаться на уровне сцены (pinch/pan).
      return;
    }

    if (e.type === 'touchstart') e.preventDefault();
    e.stopPropagation();
    cleanupListeners();

    setIsInteracting(true);
    setSelectedId(id);

    if (mode === 'select-only') {
      setActiveHandle(null);
      setIsInteracting(false);
      return;
    }
    setActiveHandle({ id, mode, extra });

    const startX = isTouch ? e.touches[0].clientX : e.clientX;
    const startY = isTouch ? e.touches[0].clientY : e.clientY;
    const initial = {
      x: shape.x,
      y: shape.y,
      w: shape.w,
      h: shape.h,
      x2: shape.x2,
      y2: shape.y2,
      rotation: shape.rotation,
      points: Array.isArray(shape.points) ? shape.points.map(p => ({ x: p.x, y: p.y })) : null
    };

    const applyMoveAt = (curX, curY) => {
      const currentStage = stageRef.current;
      const dxGlobal = (curX - startX) / currentStage.scale;
      const dyGlobal = (curY - startY) / currentStage.scale;

      setShapes(prev => updateShapeById(prev, id, (s) => {
        if (mode === 'move') {
          const res = { ...s, x: initial.x + dxGlobal, y: initial.y + dyGlobal };
          if (s.type === 'line') {
            res.x2 = (initial.x2 || 0) + dxGlobal;
            res.y2 = (initial.y2 || 0) + dyGlobal;
          }
          return res;
        }
        if (mode === 'resize') {
          const angleRad = (initial.rotation * Math.PI) / 180;
          const cosA = Math.cos(angleRad);
          const sinA = Math.sin(angleRad);
          const dxLocal = dxGlobal * cosA + dyGlobal * sinA;
          const dyLocal = -dxGlobal * sinA + dyGlobal * cosA;
          let newW = Math.max(20, initial.w + dxLocal * 2);
          let newH = Math.max(20, initial.h + dyLocal * 2);

          if ((keepAspectRatioRef.current || s.type === SHAPE_TYPES.IMAGE) && initial.w !== 0 && initial.h !== 0) {
            const ratio = initial.w / initial.h;
            if (Math.abs(dxLocal) > Math.abs(dyLocal)) newH = newW / ratio;
            else newW = newH * ratio;
          }
          return { ...s, w: newW, h: newH };
        }
        if (mode === 'rotate') {
          const centerX = initial.x + initial.w / 2;
          const centerY = initial.y + initial.h / 2;
          const currentMouseX = (curX - currentStage.x) / currentStage.scale;
          const currentMouseY = (curY - currentStage.y) / currentStage.scale;
          const angle = Math.atan2(currentMouseY - centerY, currentMouseX - centerX);
          return { ...s, rotation: (angle * 180 / Math.PI) + 90 };
        }
        if (mode === 'line-point') {
          return extra === 'start'
            ? { ...s, x: initial.x + dxGlobal, y: initial.y + dyGlobal }
            : { ...s, x2: (initial.x2 || 0) + dxGlobal, y2: (initial.y2 || 0) + dyGlobal };
        }
        if (mode === 'poly-point') {
          const newPoints = [...s.points];
          newPoints[extra] = {
            x: initial.points[extra].x + dxGlobal,
            y: initial.points[extra].y + dyGlobal
          };
          return { ...s, points: newPoints };
        }
        return s;
      }));
    };

    const onMove = (moveEvent) => {
      const isMoveTouch = moveEvent.type.startsWith('touch');
      if (isMoveTouch && moveEvent.touches.length > 1) return;
      const curX = isMoveTouch ? moveEvent.touches[0].clientX : moveEvent.clientX;
      const curY = isMoveTouch ? moveEvent.touches[0].clientY : moveEvent.clientY;

      lastPointerRef.current = { x: curX, y: curY };
      if (rafIdRef.current) return;

      rafIdRef.current = requestAnimationFrame(() => {
        rafIdRef.current = 0;
        const latest = lastPointerRef.current;
        if (!latest) return;
        applyMoveAt(latest.x, latest.y);
      });
    };

    const onUp = () => {
      const latest = lastPointerRef.current;
      if (latest) {
        if (rafIdRef.current) {
          cancelAnimationFrame(rafIdRef.current);
          rafIdRef.current = 0;
        }
        applyMoveAt(latest.x, latest.y);
      }
      cleanupListeners();
      setActiveHandle(null);
      setIsInteracting(false);
      if (mode === 'poly-point') {
        setShapes(prev => updateShapeById(prev, id, (s) => {
          const xs = s.points.map(p => p.x);
          const ys = s.points.map(p => p.y);
          const minX = Math.min(...xs);
          const minY = Math.min(...ys);
          return {
            ...s,
            x: s.x + minX,
            y: s.y + minY,
            w: Math.max(Math.max(...xs) - minX, 1),
            h: Math.max(Math.max(...ys) - minY, 1),
            points: s.points.map(p => ({ x: p.x - minX, y: p.y - minY }))
          };
        }));
      }
    };

    listenersRef.current = { onMove, onUp };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onUp);
    window.addEventListener('touchcancel', onUp);
    window.addEventListener('blur', onUp);
  }, [activeToolRef, shapesRef, stageRef, keepAspectRatioRef, setShapes, setSelectedId, setIsInteracting, cleanupListeners, updateShapeById, setActiveHandle]);

  return { handleShapeInteraction };
}

const initialAppState = {
  stage: { x: 20, y: 80, scale: 0.5 },
  shapes: [],
  selectedId: null,
  activeTool: TOOLS.SELECT,
  showSettings: false,
  showLayers: false,
  keepAspectRatio: true,
  polyPoints: [],
  isInteracting: false
};

function appReducer(state, action) {
  switch (action.type) {
    case 'SET_STAGE':
      return {
        ...state,
        stage: typeof action.payload === 'function'
          ? action.payload(state.stage)
          : action.payload
      };
    case 'SET_SHAPES':
      return {
        ...state,
        shapes: typeof action.payload === 'function'
          ? action.payload(state.shapes)
          : action.payload
      };
    case 'SET_SELECTED_ID':
      return { ...state, selectedId: action.payload };
    case 'SET_ACTIVE_TOOL':
      return { ...state, activeTool: action.payload };
    case 'SET_SHOW_SETTINGS':
      return { ...state, showSettings: action.payload };
    case 'SET_SHOW_LAYERS':
      return { ...state, showLayers: action.payload };
    case 'SET_KEEP_ASPECT_RATIO':
      return { ...state, keepAspectRatio: action.payload };
    case 'SET_POLY_POINTS':
      return {
        ...state,
        polyPoints: typeof action.payload === 'function'
          ? action.payload(state.polyPoints)
          : action.payload
      };
    case 'SET_IS_INTERACTING':
      return { ...state, isInteracting: action.payload };
    default:
      return state;
  }
}

function App() {
  const [state, dispatch] = useReducer(appReducer, initialAppState);
  const [activeHandle, setActiveHandle] = useState(null);
  const [layerColorPickerShapeId, setLayerColorPickerShapeId] = useState(null);
  const [imageQuickMenu, setImageQuickMenu] = useState(null);
  const {
    stage,
    shapes,
    selectedId,
    activeTool,
    showSettings,
    showLayers,
    keepAspectRatio,
    polyPoints,
    isInteracting
  } = state;

  const setStage = useCallback((payload) => dispatch({ type: 'SET_STAGE', payload }), []);
  const setShapes = useCallback((payload) => dispatch({ type: 'SET_SHAPES', payload }), []);
  const setSelectedId = useCallback((payload) => dispatch({ type: 'SET_SELECTED_ID', payload }), []);
  const setActiveTool = useCallback((payload) => dispatch({ type: 'SET_ACTIVE_TOOL', payload }), []);
  const setShowSettings = useCallback((payload) => dispatch({ type: 'SET_SHOW_SETTINGS', payload }), []);
  const setShowLayers = useCallback((payload) => dispatch({ type: 'SET_SHOW_LAYERS', payload }), []);
  const setKeepAspectRatio = useCallback((payload) => dispatch({ type: 'SET_KEEP_ASPECT_RATIO', payload }), []);
  const setPolyPoints = useCallback((payload) => dispatch({ type: 'SET_POLY_POINTS', payload }), []);
  const setIsInteracting = useCallback((payload) => dispatch({ type: 'SET_IS_INTERACTING', payload }), []);
  
  const containerRef = useRef(null);

  const touchState = useRef({
    initialDist: 0,
    initialScale: 0,
    initialX: 0,
    initialY: 0,
    initialStageX: 0,
    initialStageY: 0
  });

  const stageRef = useRef(stage);
  const shapesRef = useRef(shapes);
  const activeToolRef = useRef(activeTool);
  const keepAspectRatioRef = useRef(keepAspectRatio);

  useEffect(() => { stageRef.current = stage; }, [stage]);
  useEffect(() => { shapesRef.current = shapes; }, [shapes]);
  useEffect(() => { activeToolRef.current = activeTool; }, [activeTool]);
  useEffect(() => { keepAspectRatioRef.current = keepAspectRatio; }, [keepAspectRatio]);

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const container = containerRef.current.getBoundingClientRect();
        
        // Scale image to fit into the current viewport.
        const viewW = container.width / stage.scale;
        const viewH = container.height / stage.scale;
        
        let imgScale = 1;
        if (img.width > viewW * 0.8 || img.height > viewH * 0.8) {
           imgScale = Math.min((viewW * 0.8) / img.width, (viewH * 0.8) / img.height);
        }
        
        const finalW = img.width * imgScale;
        const finalH = img.height * imgScale;
        
        const centerX = (container.width / 2 - stage.x) / stage.scale;
        const centerY = (container.height / 2 - stage.y) / stage.scale;

        const newImageShape = {
          id: generateId(),
          type: SHAPE_TYPES.IMAGE,
          index: shapes.length + 1,
          src: event.target.result,
          x: centerX - finalW / 2,
          y: centerY - finalH / 2,
          w: finalW,
          h: finalH,
          rotation: 0,
          opacity: 100,
          isLocked: false,
          isVisible: true,
          // Image filter controls.
          hue: 0,
          saturation: 100,
          brightness: 100,
          invert: false
        };
        
        // Images are always placed below vector shapes,
        // but above previously added images.
        setShapes(prev => {
          const images = prev.filter(s => s.type === SHAPE_TYPES.IMAGE);
          const vectors = prev.filter(s => s.type !== SHAPE_TYPES.IMAGE);
          return [...images, newImageShape, ...vectors];
        });
        
        setSelectedId(newImageShape.id);
        setActiveTool(TOOLS.SELECT);
        e.target.value = ''; // Reset input so the same file can be selected again.
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  };

  const addShape = (type) => {
    if (type === SHAPE_TYPES.POLY) {
      setActiveTool(TOOLS.POLY_DRAW);
      setPolyPoints([]);
      setSelectedId(null);
      return;
    }

    const container = containerRef.current.getBoundingClientRect();
    const centerX = (container.width / 2 - stage.x) / stage.scale;
    const centerY = (container.height / 2 - stage.y) / stage.scale;
    
    const isLine = type === SHAPE_TYPES.LINE;
    const isTriangle = type === SHAPE_TYPES.TRIANGLE;
    
    const defaultWidth = 100;
    const defaultHeight = isLine ? 2 : (isTriangle ? defaultWidth * (Math.sqrt(3) / 2) : 100);

    const newShape = {
      id: generateId(),
      type,
      index: shapes.length + 1,
      x: centerX - defaultWidth / 2,
      y: centerY - defaultHeight / 2,
      w: defaultWidth,
      h: defaultHeight,
      x2: isLine ? centerX + 50 : null,
      y2: isLine ? centerY : null,
      rotation: 0,
      fill: isLine ? 'transparent' : '#3b82f6',
      stroke: '#3b82f6',
      strokeWidth: 2,
      divisions: 1, 
      opacity: 60,
      isLocked: false,
      isVisible: true
    };
    setShapes([...shapes, newShape]);
    setSelectedId(newShape.id);
    setActiveTool(TOOLS.SELECT);
  };

  const finalizePoly = (closed = true) => {
    if (polyPoints.length < (closed ? 3 : 2)) {
      setActiveTool(TOOLS.SELECT);
      setPolyPoints([]);
      return;
    }

    const MERGE_THRESHOLD = 10; 
    const mergedPoints = [];
    
    for (let i = 0; i < polyPoints.length; i++) {
      const current = polyPoints[i];
      if (mergedPoints.length === 0) {
        mergedPoints.push(current);
      } else {
        const last = mergedPoints[mergedPoints.length - 1];
        const dist = Math.hypot(current.x - last.x, current.y - last.y);
        if (dist > MERGE_THRESHOLD) {
          mergedPoints.push(current);
        }
      }
    }

    if (closed && mergedPoints.length > 2) {
      const first = mergedPoints[0];
      const last = mergedPoints[mergedPoints.length - 1];
      const dist = Math.hypot(first.x - last.x, first.y - last.y);
      if (dist <= MERGE_THRESHOLD) {
        mergedPoints.pop();
      }
    }

    const xs = mergedPoints.map(p => p.x);
    const ys = mergedPoints.map(p => p.y);
    const minX = Math.min(...xs);
    const minY = Math.min(...ys);
    const maxX = Math.max(...xs);
    const maxY = Math.max(...ys);
    const width = Math.max(maxX - minX, 1);
    const height = Math.max(maxY - minY, 1);

    const normalizedPoints = mergedPoints.map(p => ({
      x: p.x - minX,
      y: p.y - minY
    }));

    const newShape = {
      id: generateId(),
      type: SHAPE_TYPES.POLY,
      index: shapes.length + 1,
      x: minX,
      y: minY,
      w: width,
      h: height,
      points: normalizedPoints,
      isClosed: closed,
      rotation: 0,
      fill: closed ? '#3b82f6' : 'transparent',
      stroke: '#3b82f6',
      strokeWidth: 2,
      opacity: 60,
      isLocked: false,
      isVisible: true
    };

    setShapes([...shapes, newShape]);
    setSelectedId(newShape.id);
    setPolyPoints([]);
    setActiveTool(TOOLS.SELECT);
  };

  const handleCanvasMouseDown = (e) => {
    setImageQuickMenu(null);
    if (e.target.closest('button') || e.target.closest('input')) return;
    if (activeTool === TOOLS.PAN) return;

    if (activeTool === TOOLS.POLY_DRAW) {
      if (e.type === 'touchstart') e.preventDefault();
      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      const clientY = e.clientY || (e.touches && e.touches[0].clientY);
      if (clientX === undefined) return;
      const rect = containerRef.current.getBoundingClientRect();
      const clickX = (clientX - rect.left - stage.x) / stage.scale;
      const clickY = (clientY - rect.top - stage.y) / stage.scale;
      if (polyPoints.length >= 3) {
        const first = polyPoints[0];
        const dist = Math.hypot(clickX - first.x, clickY - first.y);
        if (dist < 20 / stage.scale) {
          finalizePoly(true);
          return;
        }
      }
      setPolyPoints(prev => [...prev, { x: clickX, y: clickY }]);
    } else {
      setSelectedId(null);
      setActiveTool(TOOLS.PAN);
    }
  };

  const deleteShape = (id) => {
    setShapes(prev => prev.filter(s => s.id !== id));
    if (selectedId === id) setSelectedId(null);
  };

  const updateShapeById = useCallback((shapeId, updater) => {
    setShapes(prev => {
      const idx = prev.findIndex(s => s.id === shapeId);
      if (idx === -1) return prev;
      const current = prev[idx];
      const next = updater(current);
      if (next === current) return prev;
      const cloned = prev.slice();
      cloned[idx] = next;
      return cloned;
    });
  }, [setShapes]);

  const updateSelectedShape = useCallback((updater) => {
    if (!selectedId) return;
    updateShapeById(selectedId, updater);
  }, [selectedId, updateShapeById]);

  const updateShapeColor = useCallback((id, color) => {
    updateShapeById(id, (s) => ({
      ...s,
      stroke: color,
      fill: (s.type === 'line' || (s.type === 'poly' && !s.isClosed)) ? 'transparent' : color
    }));
  }, [updateShapeById]);

  const updateSelectedStroke = useCallback((color) => {
    updateSelectedShape((s) => ({ ...s, stroke: color }));
  }, [updateSelectedShape]);

  const updateSelectedFill = useCallback((color) => {
    updateSelectedShape((s) => ({ ...s, fill: color }));
  }, [updateSelectedShape]);

  const { handleCanvasTouchStart: handleStageTouchStart, handleCanvasTouchMove, handleCanvasTouchEnd, handleCanvasTouchCancel } = useStageGestures({
    activeToolRef,
    touchState,
    stageRef,
    setStage,
    containerRef
  });

  const { handleShapeInteraction } = useShapeTransform({
    activeToolRef,
    shapesRef,
    stageRef,
    keepAspectRatioRef,
    setShapes,
    setSelectedId,
    setIsInteracting,
    setActiveHandle
  });

  const handleCanvasTouchStart = useCallback((e) => {
    if (activeToolRef.current === TOOLS.POLY_DRAW) {
      handleCanvasMouseDown(e);
      return;
    }
    if (activeToolRef.current !== TOOLS.PAN) {
      setSelectedId(null);
      setActiveTool(TOOLS.PAN);
      return;
    }
    handleStageTouchStart(e);
  }, [activeToolRef, handleCanvasMouseDown, handleStageTouchStart, setSelectedId, setActiveTool]);

  const toggleLock = useCallback((id) => {
    updateShapeById(id, (s) => ({ ...s, isLocked: !s.isLocked }));
  }, [updateShapeById]);

  const toggleVisibility = useCallback((id) => {
    updateShapeById(id, (s) => ({ ...s, isVisible: !s.isVisible }));
    if (selectedId === id) setSelectedId(null);
  }, [updateShapeById, selectedId, setSelectedId]);

  const toggleAllVisibility = useCallback(() => {
    const anyVisible = shapes.some(s => s.isVisible);
    setShapes(prev => prev.map(s => ({ ...s, isVisible: !anyVisible })));
    if (anyVisible) setSelectedId(null);
  }, [shapes, setShapes, setSelectedId]);

  const selectedShape = shapes.find(s => s.id === selectedId);
  const layerColorTarget = shapes.find(s => s.id === layerColorPickerShapeId) || null;
  const quickImageTarget = imageQuickMenu ? shapes.find(s => s.id === imageQuickMenu.shapeId) : null;
  const supportsFill = !!selectedShape && selectedShape.type !== 'line' && !(selectedShape.type === 'poly' && !selectedShape.isClosed);

  useEffect(() => {
    if (!layerColorPickerShapeId) return;
    const exists = shapes.some(s => s.id === layerColorPickerShapeId);
    if (!exists) setLayerColorPickerShapeId(null);
  }, [layerColorPickerShapeId, shapes]);

  useEffect(() => {
    if (!imageQuickMenu) return;
    const exists = shapes.some(s => s.id === imageQuickMenu.shapeId);
    if (!exists) setImageQuickMenu(null);
  }, [imageQuickMenu, shapes]);

  const openImageQuickMenu = useCallback((shapeId, point) => {
    if (activeToolRef.current === TOOLS.PAN) return;
    setSelectedId(shapeId);
    setImageQuickMenu({
      shapeId,
      x: point.x,
      y: point.y,
      control: null
    });
  }, [activeToolRef, setSelectedId]);

  const applyQuickImageValue = useCallback((control, value) => {
    if (!imageQuickMenu) return;
    updateShapeById(imageQuickMenu.shapeId, (s) => {
      if (s.type !== SHAPE_TYPES.IMAGE) return s;
      if (control === 'hue') return { ...s, hue: Number(value) };
      if (control === 'saturation') return { ...s, saturation: Number(value) };
      if (control === 'lightness') return { ...s, brightness: Number(value) };
      if (control === 'transparency') return { ...s, opacity: Math.max(0, 100 - Number(value)) };
      return s;
    });
  }, [imageQuickMenu, updateShapeById]);

  const getQuickControlConfig = useCallback((control, shape) => {
    if (!shape) return null;
    if (control === 'hue') return { label: 'Hue', min: 0, max: 360, value: shape.hue || 0, suffix: 'deg' };
    if (control === 'saturation') return { label: 'Saturation', min: 0, max: 200, value: shape.saturation ?? 100, suffix: '%' };
    if (control === 'lightness') return { label: 'Lightness', min: 0, max: 200, value: shape.brightness ?? 100, suffix: '%' };
    if (control === 'transparency') return { label: 'Transparency', min: 0, max: 100, value: 100 - (shape.opacity ?? 100), suffix: '%' };
    return null;
  }, []);

  const QUICK_MENU_START_ANGLE = 210;
  const QUICK_MENU_END_ANGLE = 330;
  const QUICK_MENU_SWEEP = QUICK_MENU_END_ANGLE - QUICK_MENU_START_ANGLE;

  const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
  const polarToCartesian = (cx, cy, radius, angleDeg) => {
    const angleRad = (angleDeg * Math.PI) / 180;
    return {
      x: cx + radius * Math.cos(angleRad),
      y: cy + radius * Math.sin(angleRad)
    };
  };

  const describeArcPath = (cx, cy, radius, startAngle, endAngle) => {
    const start = polarToCartesian(cx, cy, radius, startAngle);
    const end = polarToCartesian(cx, cy, radius, endAngle);
    const largeArcFlag = Math.abs(endAngle - startAngle) > 180 ? 1 : 0;
    return `M ${start.x} ${start.y} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${end.x} ${end.y}`;
  };

  const applyTransparencyFromPoint = useCallback((clientX, clientY) => {
    if (!imageQuickMenu) return;
    const dx = clientX - imageQuickMenu.x;
    const dy = clientY - imageQuickMenu.y;
    const rawAngle = (Math.atan2(dy, dx) * 180) / Math.PI;
    const normalized = (rawAngle + 360) % 360;
    const clampedAngle = clamp(normalized, QUICK_MENU_START_ANGLE, QUICK_MENU_END_ANGLE);
    const transparency = ((QUICK_MENU_END_ANGLE - clampedAngle) / QUICK_MENU_SWEEP) * 100;
    applyQuickImageValue('transparency', clamp(transparency, 0, 100));
  }, [imageQuickMenu, applyQuickImageValue, QUICK_MENU_SWEEP]);

  const applyHSLFromPoint = useCallback((clientX, clientY, control) => {
    if (!imageQuickMenu) return;
    const dx = clientX - imageQuickMenu.x;
    const dy = clientY - imageQuickMenu.y;
    const rawAngle = (Math.atan2(dy, dx) * 180) / Math.PI;
    const normalized = (rawAngle + 360) % 360;
    const clampedAngle = clamp(normalized, QUICK_MENU_START_ANGLE, QUICK_MENU_END_ANGLE);
    
    const cfg = getQuickControlConfig(control, quickImageTarget);
    if (!cfg) return;
    
    const value = ((clampedAngle - QUICK_MENU_START_ANGLE) / QUICK_MENU_SWEEP) * (cfg.max - cfg.min) + cfg.min;
    applyQuickImageValue(control, clamp(value, cfg.min, cfg.max));
  }, [imageQuickMenu, applyQuickImageValue, getQuickControlConfig, quickImageTarget, QUICK_MENU_START_ANGLE, QUICK_MENU_END_ANGLE, QUICK_MENU_SWEEP, clamp]);

  const getShapeIcon = (shape) => {
    if (!shape) return null;
    const defaultColor = shape.stroke || '#9ca3af';
    const props = { size: 18, style: { color: defaultColor } };
    
    switch(shape.type) {
      case 'rect': return <Square {...props} fill={defaultColor} fillOpacity={0.2} />;
      case 'circle': return <Circle {...props} fill={defaultColor} fillOpacity={0.2} />;
      case 'triangle': return <Triangle {...props} fill={defaultColor} fillOpacity={0.2} />;
      case 'line': return <Minus {...props} className="rotate-45" />;
      case 'poly': return <Pentagon {...props} fill={defaultColor} fillOpacity={0.2} />;
      case 'image': return (
        <img 
          src={shape.src} 
          className="w-full h-full object-cover rounded-[inherit]" 
          style={{ 
            filter: `hue-rotate(${shape.hue || 0}deg) saturate(${shape.saturation ?? 100}%) brightness(${shape.brightness ?? 100}%) invert(${shape.invert ? 100 : 0}%)` 
          }} 
          alt="thumb" 
        />
      );
      default: return null;
    }
  };

  const anyVisible = shapes.some(s => s.isVisible);
  const visibleImages = useMemo(
    () => shapes.filter(s => s.isVisible && s.type === SHAPE_TYPES.IMAGE),
    [shapes]
  );
  const visibleNonImageShapes = useMemo(
    () => shapes.filter(s => s.isVisible && s.type !== SHAPE_TYPES.IMAGE),
    [shapes]
  );
  const reversedShapes = useMemo(() => [...shapes].reverse(), [shapes]);

  const openLayersPanel = useCallback(() => {

      {/* CANVAS AREA */}
      <div

            <ShapeItem

              onToggleLock={toggleLock}

        <button onClick={() => addShape(SHAPE_TYPES.TRIANGLE)} className="p-3 text-gray-500 hover:text-white active:scale-95 transition-all"><Triangle size={20}/></button>

          <div className="flex items-center justify-between mb-6">

              <div className="w-10 h-10 bg-blue-500/20 rounded-xl flex items-center justify-center text-blue-500 overflow-hidden">

              <h3 className="text-sm font-bold">Properties #{selectedShape.index}</h3>

            <button onClick={() => setShowSettings(false)} className="p-2 text-gray-500 hover:text-white bg-white/5 rounded-full transition-all"><X size={18} /></button>

                  <span className="text-xs text-gray-500 font-mono w-4">6</span>
                </div>
              </div>

            {/* Filters block for images */}
            {selectedShape.type === 'image' && (
              <div className="bg-white/5 p-4 rounded-2xl space-y-4">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-medium">Color correction</span>
                  <button 
                    onClick={(e) => { 
                      e.stopPropagation(); 
                      updateSelectedShape(s => ({ ...s, invert: !s.invert })); 
                    }} 
                    className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${selectedShape.invert ? 'bg-white text-black' : 'bg-[#222] text-gray-300 hover:bg-[#333]'}`}

                    Invert
                  </button>
                </div>
                
                <div className="flex items-center gap-3">
                  <Palette size={16} className="text-gray-500" />
                  <div className="flex-1">
                    <div className="flex justify-between text-[10px] text-gray-500 mb-1"><span>Hue</span><span>{selectedShape.hue || 0}°</span></div>
                    <input type="range" min="0" max="360" value={selectedShape.hue || 0} onChange={e => updateSelectedShape(s => ({ ...s, hue: Number(e.target.value) }))} className="w-full h-1.5 rounded-lg appearance-none" style={{ background: 'linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000)' }} />

                      <button
                        onClick={(e) => { e.stopPropagation(); updateSelectedStroke('transparent'); }}
                        className={`px-2 py-1 text-[10px] rounded-md border transition-colors ${selectedShape.stroke === 'transparent' ? 'bg-blue-500/20 border-blue-400/50 text-blue-300' : 'bg-white/5 border-white/10 text-gray-400 hover:text-white'}`}

                        None

                  </div>
                  <div className="flex flex-wrap gap-2">
                    {COLOR_PRESETS.map((color) => (
                      <button
                        key={`stroke-${color}`}
                        onClick={(e) => { e.stopPropagation(); updateSelectedStroke(color); }}
                        className={`w-7 h-7 rounded-full border-2 transition-transform active:scale-90 ${selectedShape.stroke === color ? 'border-white scale-105' : 'border-white/20'}`}

                        title={`Stroke ${color}`}

                            type="color"
                            className="w-8 h-8 bg-transparent border-0 cursor-pointer"

                            onChange={e => updateSelectedFill(e.target.value)}
                            onClick={e => e.stopPropagation()}
                            title="Custom fill color"
                          />
                          <button
                            onClick={(e) => { e.stopPropagation(); updateSelectedFill('transparent'); }}
                            className={`px-2 py-1 text-[10px] rounded-md border transition-colors ${selectedShape.fill === 'transparent' ? 'bg-blue-500/20 border-blue-400/50 text-blue-300' : 'bg-white/5 border-white/10 text-gray-400 hover:text-white'}`}
                          >

                        </div>
                      </div>
                      <div className="flex flex-wrap gap-2">
                        {COLOR_PRESETS.map((color) => (

                            key={`fill-${color}`}
                            onClick={(e) => { e.stopPropagation(); updateSelectedFill(color); }}
                            className={`w-7 h-7 rounded-full border-2 transition-transform active:scale-90 ${selectedShape.fill === color ? 'border-white scale-105' : 'border-white/20'}`}
                            style={{ backgroundColor: color }}
                            title={`Fill ${color}`}
                          />

                      </div>
                    </>

                    <input type="range" className="flex-1 h-1.5 bg-white/10 rounded-lg appearance-none accent-blue-500" value={selectedShape.opacity} onChange={e => updateSelectedShape(s => ({ ...s, opacity: Number(e.target.value) }))} onClick={e => e.stopPropagation()} />

                     <span className="text-[10px] text-gray-500">Opacity</span>
                     <input type="range" className="flex-1 h-1.5 bg-white/10 rounded-lg appearance-none accent-blue-500" value={selectedShape.opacity} onChange={e => updateSelectedShape(s => ({ ...s, opacity: Number(e.target.value) }))} onClick={e => e.stopPropagation()} />
                   </div>
                </div>
              )}

              {/* Stroke width is not used for images */}
              {selectedShape.type !== 'image' && (
                <div className="flex items-center justify-between gap-4 bg-white/5 p-2 rounded-2xl">
                  <div className="flex-1 flex items-center gap-3 px-4">
                     <PenTool size={18} className="text-gray-500 shrink-0" />
                     <input type="range" min="1" max="20" step="1" className="w-full h-1.5 bg-white/10 rounded-lg appearance-none accent-blue-500" value={selectedShape.strokeWidth} onChange={e => updateSelectedShape(s => ({ ...s, strokeWidth: Number(e.target.value) }))} onClick={e => e.stopPropagation()} />
                  </div>
                </div>

            </div>
            
            <div className="flex gap-3">
              <button onClick={(e) => { e.stopPropagation(); toggleLock(selectedId); }} className={`flex-1 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all active:scale-95 ${selectedShape.isLocked ? 'bg-orange-500/20 text-orange-500 border border-orange-500/30' : 'bg-white/5 text-gray-400'}`}>

                  <span className="text-sm">{selectedShape.isLocked ? 'Locked' : 'Unlocked'}</span>
              </button>
              <button onClick={(e) => { e.stopPropagation(); deleteShape(selectedId); }} className="p-4 bg-red-500/10 text-red-500 rounded-2xl active:bg-red-500/20 transition-all border border-red-500/10"><Trash2 size={22}/></button>
            </div>
          </div>
        </div>
      )}

      {layerColorTarget && (
        <div
          className="fixed inset-0 z-[120] bg-black/55 backdrop-blur-[1px] flex items-center justify-center p-4"
          onClick={() => setLayerColorPickerShapeId(null)}
        >
          <div
            className="w-full max-w-xs bg-[#1f2127] border border-white/10 rounded-3xl p-4 shadow-2xl"
            onClick={(e) => e.stopPropagation()}
          >
            <div className="flex items-center justify-between mb-3">
              <span className="text-sm font-semibold text-white">Choose shape color</span>
              <button
                onClick={() => setLayerColorPickerShapeId(null)}
                className="text-gray-400 hover:text-white p-1"
              >
                <X size={16} />
              </button>
            </div>
            <div className="grid grid-cols-5 gap-2.5 mb-3">
              {COLOR_PRESETS.map((color) => (
                <button
                  key={`layer-modal-${color}`}
                  onClick={() => {
                    updateShapeColor(layerColorTarget.id, color);
                    setLayerColorPickerShapeId(null);

                  className={`w-9 h-9 rounded-full border-2 transition-transform active:scale-90 ${layerColorTarget.stroke === color ? 'border-white scale-105' : 'border-white/20'}`}
                  style={{ backgroundColor: color }}
                  title={color}
                />
              ))}
            </div>
            <div className="flex items-center justify-between gap-2">
              <button
                onClick={() => {
                  updateShapeColor(layerColorTarget.id, 'transparent');
                  setLayerColorPickerShapeId(null);
                }}
                className={`px-3 py-2 rounded-lg border text-xs transition-colors ${layerColorTarget.stroke === 'transparent' ? 'bg-blue-500/20 border-blue-400/60 text-blue-300' : 'bg-white/5 border-white/10 text-gray-300 hover:text-white'}`}
              >
                No stroke
              </button>
              <button
                onClick={() => setLayerColorPickerShapeId(null)}
                className="px-3 py-2 rounded-lg border border-white/10 bg-white/5 text-xs text-gray-300 hover:text-white"
              >
                Close
              </button>
            </div>
          </div>
        </div>

      {imageQuickMenu && quickImageTarget && (
        <>

          <div

            style={{ left: imageQuickMenu.x, top: imageQuickMenu.y, transform: 'translate(-50%, -50%)' }}
          >
            <div className="relative w-80 h-80">
              {imageQuickMenu.control === 'transparency' && (() => {
                const center = 160;
                const arcRadius = 135;
                const cfg = getQuickControlConfig('transparency', quickImageTarget);
                const transparencyValue = cfg ? cfg.value : 0;
                const angle = QUICK_MENU_END_ANGLE - (transparencyValue / 100) * QUICK_MENU_SWEEP;
                const knob = polarToCartesian(center, center, arcRadius, angle);
                const backgroundArc = describeArcPath(center, center, arcRadius, QUICK_MENU_START_ANGLE, QUICK_MENU_END_ANGLE);
                const valueArc = describeArcPath(center, center, arcRadius, angle, QUICK_MENU_END_ANGLE);
                return (
                  <svg
                    className="absolute inset-0 pointer-events-none"
                    viewBox="0 0 320 320"
                    style={{ pointerEvents: 'none' }}
                  >
                    <path d={backgroundArc} stroke="rgba(255,255,255,0.16)" strokeWidth="20" fill="none" strokeLinecap="round" />
                    <path d={valueArc} stroke="#22d3ee" strokeWidth="20" fill="none" strokeLinecap="round" />
                    <circle cx={knob.x} cy={knob.y} r="11" fill="#111827" stroke="#22d3ee" strokeWidth="3" />
                  </svg>
                );
              })()}

              {['hue', 'saturation', 'lightness'].includes(imageQuickMenu.control) && (() => {
                const center = 160;
                const arcRadius = 135;
                const control = imageQuickMenu.control;
                const cfg = getQuickControlConfig(control, quickImageTarget);
                if (!cfg) return null;
                const currentValue = cfg.value;
                const normalizedValue = (currentValue - cfg.min) / (cfg.max - cfg.min);
                const angle = QUICK_MENU_START_ANGLE + normalizedValue * QUICK_MENU_SWEEP;
                const knob = polarToCartesian(center, center, arcRadius, angle);
                const backgroundArc = describeArcPath(center, center, arcRadius, QUICK_MENU_START_ANGLE, QUICK_MENU_END_ANGLE);
                const valueArc = describeArcPath(center, center, arcRadius, QUICK_MENU_START_ANGLE, angle);
                
                let arcColor = '#22d3ee';
                if (control === 'hue') arcColor = '#f472b6';
                if (control === 'saturation') arcColor = '#a78bfa';
                if (control === 'lightness') arcColor = '#fbbf24';
                
                return (
                  <svg
                    className="absolute inset-0 pointer-events-none"
                    viewBox="0 0 320 320"
                    style={{ pointerEvents: 'none' }}
                  >
                    <path d={backgroundArc} stroke="rgba(255,255,255,0.16)" strokeWidth="20" fill="none" strokeLinecap="round" />
                    <path d={valueArc} stroke={arcColor} strokeWidth="20" fill="none" strokeLinecap="round" />
                    <circle cx={knob.x} cy={knob.y} r="11" fill="#111827" stroke={arcColor} strokeWidth="3" />
                  </svg>
                );
              })()}

              <div
                className="absolute inset-0 z-10"
                onMouseDown={(e) => {
                  e.preventDefault();
                  e.stopPropagation();
                  if (imageQuickMenu.control === 'transparency') applyTransparencyFromPoint(e.clientX, e.clientY);
                  else if (['hue', 'saturation', 'lightness'].includes(imageQuickMenu.control)) applyHSLFromPoint(e.clientX, e.clientY, imageQuickMenu.control);
                }}
                onMouseMove={(e) => {
                  if (e.buttons === 1) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (imageQuickMenu.control === 'transparency') applyTransparencyFromPoint(e.clientX, e.clientY);
                    else if (['hue', 'saturation', 'lightness'].includes(imageQuickMenu.control)) applyHSLFromPoint(e.clientX, e.clientY, imageQuickMenu.control);
                  }
                }}
                onTouchStart={(e) => {
                  e.preventDefault();
                  e.stopPropagation();
                  if (e.touches && e.touches[0]) {
                    if (imageQuickMenu.control === 'transparency') applyTransparencyFromPoint(e.touches[0].clientX, e.touches[0].clientY);
                    else if (['hue', 'saturation', 'lightness'].includes(imageQuickMenu.control)) applyHSLFromPoint(e.touches[0].clientX, e.touches[0].clientY, imageQuickMenu.control);
                  }
                }}
                onTouchMove={(e) => {
                  e.preventDefault();
                  e.stopPropagation();
                  if (e.touches && e.touches[0]) {
                    if (imageQuickMenu.control === 'transparency') applyTransparencyFromPoint(e.touches[0].clientX, e.touches[0].clientY);
                    else if (['hue', 'saturation', 'lightness'].includes(imageQuickMenu.control)) applyHSLFromPoint(e.touches[0].clientX, e.touches[0].clientY, imageQuickMenu.control);
                  }
                }}
              >
                <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center z-10">
                  <button
                    onClick={() => setImageQuickMenu(null)}
                    className="w-12 h-12 rounded-full border border-white/10 text-black bg-[#2d322f] text-lg font-bold flex items-center justify-center relative z-20"
                  >X</button>
                  <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div className="relative w-full h-full">
                      {['hue', 'saturation', 'lightness', 'transparency'].map((key, idx) => {
                        const control = { hue: 'H', saturation: 'S', lightness: 'L', transparency: 'Tr' }[key];
                        const isActive = imageQuickMenu.control === key;
                        let activeClass = 'border-cyan-300 text-cyan-300';
                        if (key === 'hue') activeClass = 'border-pink-400 text-pink-400';
                        if (key === 'saturation') activeClass = 'border-purple-400 text-purple-400';
                        if (key === 'lightness') activeClass = 'border-amber-400 text-amber-400';
                        if (key === 'transparency') activeClass = 'border-cyan-300 text-cyan-300';
                        
                        const positions = [
                          { right: 'auto', left: '-44px', top: '50%', transform: 'translateY(-50%)' },
                          { right: '-44px', left: 'auto', top: '50%', transform: 'translateY(-50%)' },
                          { right: 'auto', left: '50%', top: '-44px', transform: 'translateX(-50%)' },
                          { right: 'auto', left: '50%', bottom: '-44px', transform: 'translateX(-50%)' }
                        ];
                        
                        return (
                          <button
                            key={key}
                            onClick={(e) => { e.stopPropagation(); setImageQuickMenu((prev) => prev ? { ...prev, control: key } : prev); }}
                            className={`absolute w-10 h-10 rounded-full border bg-[#242826] text-sm font-semibold pointer-events-auto ${isActive ? activeClass : 'border-white/10 text-cyan-400'}`}
                            style={positions[idx]}
                          >{control}</button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          {imageQuickMenu.control && ['hue', 'saturation', 'lightness'].includes(imageQuickMenu.control) && (() => {
            const cfg = getQuickControlConfig(imageQuickMenu.control, quickImageTarget);
            if (!cfg) return null;
            
            let labelColor = 'text-cyan-300';
            if (imageQuickMenu.control === 'hue') labelColor = 'text-pink-400';
            if (imageQuickMenu.control === 'saturation') labelColor = 'text-purple-400';
            if (imageQuickMenu.control === 'lightness') labelColor = 'text-amber-400';
            
            return (
              <div className="fixed left-1/2 -translate-x-1/2 bottom-6 z-[120] text-sm font-mono bg-[#1d1f25]/90 border border-white/10 px-3 py-1.5 rounded-lg flex items-center gap-2">
                <span className="text-gray-400">{cfg.label}:</span>
                <span className={`${labelColor} font-bold`}>{Math.round(cfg.value)}{cfg.suffix}</span>
              </div>
            );
          })()}
          {imageQuickMenu.control === 'transparency' && (() => {
            const cfg = getQuickControlConfig('transparency', quickImageTarget);
            if (!cfg) return null;
            return (
              <div className="fixed left-1/2 -translate-x-1/2 bottom-6 z-[120] text-cyan-300 text-sm font-mono bg-[#1d1f25]/90 border border-white/10 px-3 py-1.5 rounded-lg">
                Transparency: {Math.round(cfg.value)}%
              </div>
            );
          })()}
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
